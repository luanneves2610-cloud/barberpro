version: '3.8'

services:
  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Web App ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - apps/web/.env.local
    depends_on:
      redis:
        condition: service_healthy

  # ── BullMQ Workers ─────────────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    command: node -e "require('tsx/cjs'); require('./apps/web/lib/queue/workers.ts')"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - apps/web/.env.local
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  redis_data:
